name: Track Contributors

on:
  pull_request_target:
    types: [opened]

concurrency:
  group: track-contributors
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update clankers.md with PR author
        run: |
          USERNAME="${{ github.event.pull_request.user.login }}"
          DATE=$(date -u +%Y-%m-%d)
          FILE="clankers.md"

          git pull --rebase origin main

          if grep -q "| $USERNAME |" "$FILE"; then
            OLD_LINE=$(grep "| $USERNAME |" "$FILE")
            OLD_COUNT=$(echo "$OLD_LINE" | awk -F'|' '{print $3}' | xargs)
            NEW_COUNT=$((OLD_COUNT + 1))
            sed -i "s/| $USERNAME | $OLD_COUNT |/| $USERNAME | $NEW_COUNT |/" "$FILE"
          else
            echo "| $USERNAME | 1 | $DATE |" >> "$FILE"
          fi

          if git diff --quiet "$FILE"; then
            echo "No changes needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "track: update $USERNAME"
          git pull --rebase origin main
          git push
