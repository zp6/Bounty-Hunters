name: Track Contributors

on:
  pull_request_target:
    types: [opened]

concurrency:
  group: track-contributors
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update clankers.md with PR author
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const username = context.payload.pull_request.user.login;
            const date = new Date().toISOString().split('T')[0];
            const file = 'clankers.md';

            execSync('git pull --rebase origin main', { stdio: 'inherit' });

            const content = fs.readFileSync(file, 'utf8');
            const lines = content.split('\n');

            // parse existing rows
            const rows = [];
            for (const line of lines) {
              const match = line.match(/^\|\s*(.+?)\s*\|\s*(\d+)\s*\|\s*([\d-]+)\s*\|$/);
              if (match && match[1] !== 'Username') {
                rows.push({ user: match[1], count: parseInt(match[2]), date: match[3] });
              }
            }

            // update or add
            const existing = rows.find(r => r.user === username);
            if (existing) {
              existing.count += 1;
            } else {
              rows.push({ user: username, count: 1, date: date });
            }

            // sort by count descending
            rows.sort((a, b) => b.count - a.count);

            // rebuild file
            let output = '# Clankers\n\n';
            output += 'Automated tracking of all Clankers PR contributors.\n\n';
            output += '| Username | Total PRs | First PR |\n';
            output += '|----------|-----------|----------|\n';
            for (const row of rows) {
              output += `| ${row.user} | ${row.count} | ${row.date} |\n`;
            }

            fs.writeFileSync(file, output);

            // check if changed
            const diff = execSync('git diff --quiet clankers.md || echo changed').toString().trim();
            if (diff !== 'changed') {
              console.log('No changes needed');
              return;
            }

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git add clankers.md');
            execSync(`git commit -m "clankers database: update ${username}"`);
            execSync('git pull --rebase origin main', { stdio: 'inherit' });
            execSync('git push', { stdio: 'inherit' });
            console.log(`Updated ${username}`);
